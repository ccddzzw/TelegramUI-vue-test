name: Compare Repositories

on:
  schedule:
    # Runs every Monday at 00:00 UTC
    - cron: '0 0 * * MON'
  workflow_dispatch:  # Add this to enable manual triggers

jobs:
  compare:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Add permissions to write to the repository

    steps:
      - name: Checkout Repository A
        uses: actions/checkout@v2
        with:
          repository: Telegram-Mini-Apps/TelegramUI  # Fixed repository format
          path: repoA

      - name: Checkout Repository B
        uses: actions/checkout@v2
        with:
          repository: ccddzzw/TelegramUI-vue-test  # Fixed repository format
          path: repoB
          token: ${{ secrets.GITHUB_TOKEN }}  # Add token for authentication
          fetch-depth: 0  # Fetch all history

      - name: Compare Directory Names
        run: |
          # Find all stories files in repoA and repoB
          componentsA=$(find repoA/src/components -type f -name "*.stories.*" | sed 's|.*/\([^/]*\)/[^/]*\.stories\..*|\1|' | sort -u)
          componentsB=$(find repoB/src/components -type f -name "*.stories.*" | sed 's|.*/\([^/]*\)/[^/]*\.stories\..*|\1|' | sort -u)

          # Create temporary file with the new table
          {
            echo "## Rate of progress"
            echo
            echo "| React Version | Vue Implementation |"
            echo "|---------------|--------------------|"
            
            # First output components with Vue Version = Y
            echo "$componentsA" | while read -r component; do
              if [ -n "$component" ]; then
                if echo "$componentsB" | grep -q "^${component}$"; then
                  echo "| $component | ✅ |"
                fi
              fi
            done

            # Then output components with Vue Version = N
            echo "$componentsA" | while read -r component; do
              if [ -n "$component" ]; then
                if ! echo "$componentsB" | grep -q "^${component}$"; then
                  echo "| $component | 🚫 |"
                fi
              fi
            done
          } > temp_table.md

      - name: Setup Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'  # Updated to Node.js 18

      - name: Install dependencies
        run: |
          npm init -y
          npm install puppeteer node-html-to-image marked

      - name: Convert Markdown to Image
        run: |
          cat << EOF > convert.js
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const marked = require('marked');

          async function convertToImage() {
            let browser = null;
            try {
              const markdown = fs.readFileSync('temp_table.md', 'utf8');
              const html = marked.parse(markdown);
              
              browser = await puppeteer.launch({
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              
              await page.setContent(\`
                <html>
                  <head>
                    <style>
                      body { font-family: Arial, sans-serif; padding: 20px; }
                      table { border-collapse: collapse; }
                      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
                      th { background-color: #f2f2f2; }
                    </style>
                  </head>
                  <body>
                    \${html}
                  </body>
                </html>\`);

              await page.screenshot({
                path: './progress_table.png',
                type: 'png',
                fullPage: true
              });
            } catch (error) {
              console.error('Error:', error);
              process.exit(1);
            } finally {
              if (browser) {
                await browser.close();
              }
            }
          }

          // Properly handle the async function
          convertToImage()
            .then(() => process.exit(0))
            .catch(() => process.exit(1));
          EOF

          node convert.js

      - name: Upload to Existing GitHub Issue
        id: upload
        run: |
          # Create assets directory if it doesn't exist
          mkdir -p assets

          # Create the JSON payload in a file
          base64 -w 0 progress_table.png > temp_image_base64.txt
          
          jq -n --rawfile content temp_image_base64.txt '{
            message: "Update progress table",
            content: $content
          }' > payload.json
          
          # Upload the image using the payload file
          RESPONSE=$(curl -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "https://api.github.com/repos/${{ github.repository }}/contents/assets/progress_table.png")
          
          # Extract the download URL from the response
          IMAGE_URL=$(echo "$RESPONSE" | jq -r '.content.download_url // empty')
          
          if [ -n "$IMAGE_URL" ]; then
            echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV
            
            # Create comment with the image
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"![Progress Table]($IMAGE_URL)\"}" \
              "https://api.github.com/repos/${{ github.repository }}/issues/1/comments"
            
            echo "Image uploaded and commented to issue #1"
          else
            echo "Failed to get image URL from response"
            echo "$RESPONSE"
            exit 1
          fi
          
          # Clean up temporary files
          rm temp_image_base64.txt payload.json

      - name: Update README with Image URL
        run: |
          echo "![Progress Table](${{ env.IMAGE_URL }})" > progress_section.md
          # Optionally, you can update your README.md here
